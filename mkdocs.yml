site_name: EmergencyForge Wiki
site_description: Das Wiki fuer EmergencyForge — Dokumentation, Anleitungen und Wissenssammlung
site_url: https://wiki.emergencyforge.de/
repo_url: https://github.com/hypax/Wiki
repo_name: hypax/Wiki
edit_uri: edit/main/docs/

theme:
  name: material
  language: de
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Dunkles Design aktivieren
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Helles Design aktivieren
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.action.edit
    - content.code.copy
    - toc.follow
  logo: assets/logo.png
  favicon: assets/logo.png
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil

plugins:
  - search:
      lang: de
  - tags

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/hypax/Wiki

nav:
  - Startseite: index.md
  - Erste Schritte:
      - Uebersicht: getting-started/index.md
      - Installation: getting-started/installation.md
      - Konfiguration: getting-started/konfiguration.md
  - Dokumentation:
      - Uebersicht: dokumentation/index.md
      - Architektur: dokumentation/architektur.md
      - API: dokumentation/api.md
  - Anleitungen:
      - Uebersicht: anleitungen/index.md
  - Mitmachen:
      - Wie kann ich beitragen?: mitmachen/beitragen.md
      - Wiki bearbeiten: mitmachen/wiki-bearbeiten.md
